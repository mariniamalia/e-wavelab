<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REFERENSI - E-WAVELAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * { font-family: 'Poppins', sans-serif; box-sizing: border-box; }

        body { 
            margin: 0; 
            background-image: linear-gradient(135deg, rgba(255, 255, 255, 0.6) 0%, rgba(255, 255, 255, 0.6) 100%), url('gbrGEM.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container { 
            width: 90%; max-width: 600px; height: 90vh; 
            background: rgba(237, 190, 190, 0.85); /* Warna pastel #edbebe */
            padding: 20px; border-radius: 40px; 
            border: 2px solid rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px); display: flex; flex-direction: column; 
            text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        h1 { color: #5d4a8e; font-size: 32px; font-weight: 800; margin-bottom: 20px; text-transform: uppercase; }

        .reference-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 15px; margin-bottom: 20px; flex-grow: 1; overflow-y: auto;
        }

        .ref-card {
            background: rgba(255, 255, 255, 0.5); border-radius: 20px; 
            padding: 15px; text-align: center; border: 2px solid rgba(255, 255, 255, 0.6);
            display: flex; flex-direction: column; justify-content: center;
        }

        .ref-card i { font-size: 24px; color: #5d4a8e; margin-bottom: 5px; }
        .ref-card h3 { color: #5d4a8e; font-size: 14px; margin: 5px 0; font-weight: 700; }
        .ref-card p { font-size: 11px; margin-bottom: 8px; color: #4a3a6a; }

        .btn-link {
            background: rgba(255, 255, 255, 0.5); color: #5d4a8e; border: 2px solid rgba(255, 255, 255, 0.6);
            padding: 8px; border-radius: 10px; font-weight: 700; 
            font-size: 11px; cursor: pointer; transition: 0.3s;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.3); color: #5d4a8e; padding: 12px 30px;
            border: none; border-radius: 20px; font-weight: 800; 
            cursor: pointer; margin-top: 10px; transition: 0.3s;
        }

        button:hover { 
            background: rgba(211, 84, 0, 0.8); color: white; border-color: transparent;
            transform: scale(1.03); 
        }
    </style>
</head>
<body class="animate__animated animate__fadeIn">

<audio id="suara-klik" src="klik.mp3"></audio>

<div class="container">
    <h1>REFERENSI</h1>
    
    <div class="reference-grid">
        <div class="ref-card">
            <i class="fa-solid fa-graduation-cap"></i>
            <h3>Modul Fisika</h3>
            <p>Kemdikbudristek</p>
            <button class="btn-link" onclick="mainkanDanBuka('https://mediabelajar.web.id/wp-content/uploads/2022/08/XII_Fisika_KD-3.6_Radiasi-Elektromagnetik.pdf')">BACA</button>
        </div>
        <div class="ref-card">
            <i class="fa-solid fa-book-open"></i>
            <h3>Modul Radiasi</h3>
            <p>Kemdikbud</p>
            <button class="btn-link" onclick="mainkanDanBuka('https://repositori.kemendikdasmen.go.id/24194/1/Modul%203%20Mengenal%20Gelombang%20dan%20Radiasi.pdf')">BACA</button>
        </div>
        <div class="ref-card">
            <i class="fa-solid fa-rocket"></i>
            <h3>NASA Science</h3>
            <p>NASA Official</p>
            <button class="btn-link" onclick="mainkanDanBuka('https://science.nasa.gov/learn/heat/resource/the-electromagnetic-spectrum/')">KUNJUNGI</button>
        </div>
        <div class="ref-card">
            <i class="fa-solid fa-flask-vial"></i>
            <h3>Simulasi PhET</h3>
            <p>Colorado Univ</p>
            <button class="btn-link" onclick="mainkanDanBuka('https://phet.colorado.edu/en/simulations/radio-waves')">SIMULASI</button>
        </div>
    </div>

    <div>
        <button class="btn-back" onclick="mainkanDanPindah('menu.html')">KEMBALI KE MENU</button>
    </div>
</div>

<script>
    function playSound() { 
        const audio = document.getElementById("suara-klik");
        audio.currentTime = 0;
        audio.play().catch(e => console.log("Audio diblokir: ", e));
    }
    
    function mainkanDanBuka(url) { 
        playSound(); 
        setTimeout(() => { window.open(url, '_blank'); }, 300); 
    }
    
    function mainkanDanPindah(url) { 
        playSound(); 
        setTimeout(() => { window.location.href = url; }, 300); 
    }
</script>
</body>
</html>
