<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Detail Materi - E-WAVELAB</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        .infografis-besar {
            max-height: 60vh; 
            width: auto;      
            max-width: 100%;
            object-fit: contain;
            margin: 0 auto 20px auto;
            display: block;
            border-radius: 20px;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 90vh;
        }
    </style>
</head>
<body>
    <audio id="suara-klik" src="klik.mp3"></audio>

    <div class="container animate__animated animate__fadeIn">
        <h1 id="judul-materi" style="margin-bottom: 20px;">Loading...</h1>
        
        <img id="gambar-infografis" src="" alt="Infografis" class="infografis-besar">
        
        <button class="btn btn-home" onclick="bukaMateri('materi.html')">KEMBALI KE DAFTAR MATERI</button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        // Folder assets/ sudah dihapus dari path sumber gambar
        const data = {
            '1': { judul: 'PETA KONSEP', src: '1-peta.PNG' },
            '2': { judul: 'KONSEP GELOMBANG', src: '2-konsep.PNG' },
            '3': { judul: 'SPEKTRUM GEM', src: '3-spektrum.PNG' },
            '4': { judul: 'SINAR GAMMA', src: '4-gamma.PNG' },
            '5': { judul: 'SINAR-X', src: '5-x.PNG' },
            '6': { judul: 'ULTRAVIOLET', src: '6-uv.PNG' },
            '7': { judul: 'CAHAYA TAMPAK', src: '7-tampak.PNG' },
            '8': { judul: 'INFRAMERAH', src: '8-merah.PNG' },
            '9': { judul: 'GELOMBANG MIKRO', src: '9-mikro.PNG' },
            '10': { judul: 'GELOMBANG RADIO', src: '10-radio.PNG' }
        };

        if (data[id]) {
            document.getElementById('judul-materi').innerText = data[id].judul;
            document.getElementById('gambar-infografis').src = data[id].src;
        } else {
            document.getElementById('judul-materi').innerText = "Materi tidak ditemukan";
        }

        function bukaMateri(url) {
            const audio = document.getElementById("suara-klik");
            audio.currentTime = 0;
            audio.play().catch(e => console.log("Audio diblokir: ", e));
            
            setTimeout(() => {
                location.href = url;
            }, 300);
        }
    </script>
</body>
</html>
