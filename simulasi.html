<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDIA & SIMULASI - E-WAVELAB</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        /* Memastikan container flex agar bisa center */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            text-align: center;
            width: 100%;
            margin-bottom: 40px;
        }

        /* Grid 3 kolom yang sama lebar */
        .media-grid {
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 25px; 
            margin-bottom: 40px;
            width: 100%;
        }

        .media-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            gap: 15px;
        }
        
        .media-title { 
            font-size: 14px; 
            font-weight: 700; 
            color: #5d4a8e; 
            text-transform: uppercase;
            text-align: center;
            height: 45px; /* Memberi ruang agar judul tetap rata */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Tombol yang seragam untuk video dan simulasi */
        .btn-media { 
            background: rgba(255, 255, 255, 0.5); 
            border: 2px solid rgba(255, 255, 255, 0.8); 
            border-radius: 20px; 
            padding: 10px; 
            cursor: pointer; 
            transition: 0.3s;
            width: 100%;
            height: 180px; /* Tinggi seragam */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .btn-media img { 
            width: 100%; height: 100%; object-fit: cover; border-radius: 10px;
        }

        .btn-media:hover { transform: scale(1.03); background: rgba(211, 84, 0, 0.7); color: white; }
    </style>
</head>
<body class="animate__animated animate__fadeIn">

<audio id="suara-klik" src="klik.mp3"></audio>

<div class="container">
    <h1>MEDIA DAN SIMULASI</h1>

    <div class="media-grid">
        <div class="media-item">
            <div class="media-title">Pengenalan Gelombang EM</div>
            <button class="btn-media" onclick="mainkanSuara('https://www.youtube.com/watch?v=pmOGInF1lqE')">
                <img src="video1.png" alt="Video 1">
            </button>
        </div>

        <div class="media-item">
            <div class="media-title">Panjang Gelombang & Frekuensi</div>
            <button class="btn-media" onclick="mainkanSuara('https://www.youtube.com/watch?v=wPj6gxxYawQ')">
                <img src="video2.png" alt="Video 2">
            </button>
        </div>

        <div class="media-item">
            <div class="media-title">Simulasi Canva</div>
            <button class="btn-media" onclick="mainkanSuara('https://taufiqbayunurr.my.canva.site/...')">
                <img src="simulasi.png" style="width: 100%; height: 100%; object-fit: cover; border-radius: 10px;" alt="Simulasi">
             </button>
        </div>
    </div>

    <button class="btn btn-home" onclick="mainkanDanPindah('menu.html')">KEMBALI KE MENU</button>
</div>

<script>
    function mainkanSuara(url) { document.getElementById("suara-klik").play(); setTimeout(() => { window.open(url, '_blank'); }, 300); }
    function mainkanDanPindah(url) { document.getElementById("suara-klik").play(); setTimeout(() => { window.location.href = url; }, 300); }
</script>
</body>
</html>
