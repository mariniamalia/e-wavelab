<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media & Simulasi - E-WAVELAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Merriweather:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { 
            margin: 0; 
            background: linear-gradient(rgba(56, 2, 8, 0.7), rgba(128, 0, 0, 0.9)), 
                        url('gbrGEM.jpg');
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            font-family: 'Poppins', sans-serif; 
            color: white;
        }

        .container { 
            width: 90%; max-width: 800px; 
            background: rgba(0, 0, 0, 0.7); 
            padding: 40px; border-radius: 25px; border: 2px solid #FFD700;
            backdrop-filter: blur(12px); box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        h1 { 
            color: #FFD700; margin-bottom: 30px; font-size: 36px; 
            font-family: 'Poppins', sans-serif; font-weight: 700; text-transform: uppercase;
        }

        .media-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;
        }

        .video-box { display: flex; flex-direction: column; gap: 10px; }
        
        .video-title { 
            font-size: 18px; font-weight: bold; color: #FFD700; height: 40px; 
            display: flex; align-items: center; justify-content: center;
        }

        /* Tombol Video dengan ukuran tetap agar selalu sama */
        .btn-video { 
            background: rgba(255, 255, 255, 0.05); 
            border: 2px solid #FFD700; 
            border-radius: 15px; 
            padding: 8px; 
            cursor: pointer; 
            transition: 0.3s;
            width: 100%; /* Mengikuti grid */
        }
        
        /* Memastikan gambar mengisi kotak secara konsisten */
        .btn-video img { 
            width: 100%; 
            height: 180px; /* Tinggi tetap */
            object-fit: cover; /* Gambar terpotong rapi tanpa distorsi */
            border-radius: 10px; 
            display: block; 
        }

        .btn-video:hover { transform: scale(1.05); background: rgba(255,255,255,0.15); }

        .bottom-actions { display: flex; justify-content: center; gap: 20px; align-items: center; }
        
        .btn-sim { 
            display: flex; flex-direction: column; align-items: center;
            background: #FFD700; color: #380208; border: none; padding: 15px;
            border-radius: 15px; cursor: pointer; font-weight: bold; transition: 0.3s;
            font-family: 'Poppins', sans-serif;
        }
        .btn-menu { 
            padding: 20px 40px; background: #FFD700; color: #380208; 
            border: none; border-radius: 15px; cursor: pointer; font-weight: bold; transition: 0.3s;
            font-family: 'Poppins', sans-serif;
        }
        button:hover { background: #fff; transform: scale(1.05); }
    </style>
</head>
<body>

<audio id="suara-klik" src="klik.mp3"></audio>

<div class="container">
    <h1>Video & Simulasi</h1>

    <div class="media-grid">
        <div class="video-box">
            <div class="video-title">Pengenalan Panjang Gelombang EM</div>
            <button class="btn-video" onclick="mainkanSuara('https://www.youtube.com/watch?v=pmOGInF1lqE')">
                <img src="video1.png" alt="Video Pengenalan">
            </button>
        </div>

        <div class="video-box">
            <div class="video-title">Panjang Gelombang & Frekuensi</div>
            <button class="btn-video" onclick="mainkanSuara('https://www.youtube.com/watch?v=wPj6gxxYawQ')">
                <img src="video2.png" alt="Video Frekuensi">
            </button>
        </div>
    </div>

    <div class="bottom-actions">
        <button class="btn-sim" onclick="mainkanSuara('https://taufiqbayunurr.my.canva.site/salinan-dari-simulasi-praktikum-virtual-gelombang-elektromagnetik-f-energi-penerapan')">
            <img src="simulasi.png" style="width: 80px; margin-bottom: 5px;" alt="Simulasi">
            SIMULASI
        </button>
        <button class="btn-menu" onclick="mainkanDanPindah('menu.html')">KEMBALI KE MENU</button>
    </div>
</div>

<script>
    function playSound() { document.getElementById("suara-klik").play(); }
    function mainkanSuara(url) { playSound(); setTimeout(() => { window.open(url, '_blank'); }, 300); }
    function mainkanDanPindah(url) { playSound(); setTimeout(() => { window.location.href = url; }, 300); }
</script>
</body>
</html>
