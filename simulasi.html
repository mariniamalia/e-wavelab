<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDIA & SIMULASI - E-WAVELAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        * { box-sizing: border-box; }

        body { 
            margin: 0; 
            /* Background disamakan dengan slide index */
            background-image: linear-gradient(135deg, rgba(255, 255, 255, 0.6) 0%, rgba(255, 255, 255, 0.6) 100%), url('gbrGEM.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            color: #333;
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: rgba(237, 190, 190, 0.85);
            padding: 40px;
            border-radius: 40px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(to right, #8e44ad, #d35400);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .media-grid {
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px; 
            margin-bottom: 30px;
        }

        .media-item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        
        .media-title { 
            font-size: 13px; font-weight: 700; color: #5d4a8e; 
            text-transform: uppercase; text-align: center; height: 40px;
        }

        .btn-media { 
            background: rgba(255, 255, 255, 0.4); 
            border: 2px solid rgba(255, 255, 255, 0.8); 
            border-radius: 20px; padding: 8px; cursor: pointer; 
            transition: 0.4s; width: 100%; height: 150px;
        }

        .btn-media img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
        .btn-media:hover { transform: translateY(-5px) scale(1.05); background: rgba(255, 255, 255, 0.8); }

        .btn-home { 
            padding: 15px 30px; background: #5d4a8e; border: none; 
            color: white; font-weight: 800; border-radius: 50px; 
            cursor: pointer; transition: 0.4s; margin-top: 10px;
        }
        .btn-home:hover { background: #4a3a6a; transform: scale(1.05); }

        @media (max-width: 600px) {
            .media-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="animate__animated animate__fadeIn">

<audio id="suara-klik" src="klik.mp3"></audio>

<div class="container">
    <h1>MEDIA DAN SIMULASI</h1>

    <div class="media-grid">
        <div class="media-item">
            <div class="media-title">Pengenalan Gelombang EM</div>
            <button class="btn-media" onclick="mainkanSuara('https://www.youtube.com/watch?v=pmOGInF1lqE')">
                <img src="video1.png" alt="Video 1">
            </button>
        </div>

        <div class="media-item">
            <div class="media-title">Panjang Gelombang & Frekuensi</div>
            <button class="btn-media" onclick="mainkanSuara('https://www.youtube.com/watch?v=wPj6gxxYawQ')">
                <img src="video2.png" alt="Video 2">
            </button>
        </div>

        <div class="media-item">
            <div class="media-title">Simulasi Canva</div>
            <button class="btn-media" onclick="mainkanSuara('https://taufiqbayunurr.my.canva.site/...')">
                <img src="simulasi.png" alt="Simulasi">
            </button>
        </div>
    </div>

    <button class="btn-home" onclick="mainkanDanPindah('menu.html')">KEMBALI KE MENU</button>
</div>

<script>
    function mainkanSuara(url) { document.getElementById("suara-klik").play(); setTimeout(() => { window.open(url, '_blank'); }, 300); }
    function mainkanDanPindah(url) { document.getElementById("suara-klik").play(); setTimeout(() => { window.location.href = url; }, 300); }
</script>
</body>
</html>
