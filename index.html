<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-WAVELAB - Interactive Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        * { box-sizing: border-box; }

        body { 
            margin: 0; 
            background-image: linear-gradient(135deg, rgba(255, 255, 255, 0.6) 0%, rgba(255, 255, 255, 0.6) 100%), url('gbrGEM.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            color: #333;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: rgba(237, 190, 190, 0.85);
            padding: 50px;
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            border: 2px solid rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            text-align: center;
            transition: transform 0.3s;
        }

        h1 {
            font-size: 48px;
            font-weight: 800;
            /* DIPERBARUI: Gradasi Lilac ke Mint agar senada dengan desain pastel */
            background: linear-gradient(to right, #8e44ad, #d35400);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .sub-title { 
            font-size: 20px; 
            font-weight: 800; 
            color: #5d4a8e; /* Warna ungu tua senada agar kontras namun lembut */
            margin-bottom: 40px; 
            text-transform: uppercase;
            white-space: nowrap; 
        }

        .menu-btn {
            padding: 18px 40px;
            background: rgba(211, 84, 0, 0.8); 
            border: none;
            color: white;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(211, 84, 0, 0.2);
            transition: 0.4s;
        }

        .menu-btn:hover {
            transform: translateY(-5px) scale(1.05);
            background: rgba(211, 84, 0, 1);
        }

        .floating { animation: float 3s infinite ease-in-out; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @media (max-width: 500px) {
            .sub-title { font-size: 14px; }
            h1 { font-size: 36px; }
        }
    </style>
</head>
<body>

    <audio id="suara-klik" src="klik.mp3"></audio>

    <div class="container animate__animated animate__zoomIn">
        <div class="floating">
            <h1>E-WAVELAB</h1>
            <p class="sub-title">EKSPLORASI GELOMBANG ELEKTROMAGNETIK</p>
        </div>
        
        <button class="menu-btn" onclick="mainkanSuara()">MULAI BELAJAR</button>
    </div>

    <script>
        function mainkanSuara() {
            var suara = document.getElementById("suara-klik");
            suara.play();
            document.querySelector('.container').classList.add('animate__fadeOut');
            setTimeout(function() { window.location.href = 'menu.html'; }, 600);
        }
    </script>
</body>
</html>
