<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TANYA AI - E-WAVELAB</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            height: 100vh; display: flex; flex-direction: column; 
            background: #fdf5f5; /* Warna latar belakang senada */
        }

        .header { 
            padding: 15px; background: rgba(237, 190, 190, 0.95); 
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 2px solid #5d4a8e;
        }

        .btn-back { 
            padding: 8px 20px; background: #5d4a8e; color: white; 
            border: none; border-radius: 20px; cursor: pointer; font-weight: 600; 
        }

        /* Iframe untuk menampilkan AI */
        iframe { 
            flex-grow: 1; width: 100%; border: none; 
            background: white; 
        }
    </style>
</head>
<body>
    <audio id="suara-klik" src="klik.mp3"></audio>

    <div class="header">
        <button class="btn-back" onclick="kembaliKeMenu('menu.html')">KEMBALI</button>
        <h2 style="color: #5d4a8e; margin: 0;">ASISTEN FISIKA AI</h2>
        <div style="width: 80px;"></div> </div>

    <iframe src="https://gemini.google.com/" title="Tanya AI"></iframe>

    <script>
        function kembaliKeMenu(url) {
            const audio = document.getElementById("suara-klik");
            audio.currentTime = 0;
            audio.play().catch(e => console.log("Audio diblokir:", e));
            
            setTimeout(function() { 
                window.location.href = url; 
            }, 300);
        }
    </script>
</body>
</html>
