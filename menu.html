<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MENU UTAMA - E-WAVELAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        * { font-family: 'Poppins', sans-serif; box-sizing: border-box; }

        body { 
            margin: 0; 
            background-image: linear-gradient(135deg, rgba(255, 255, 255, 0.6) 0%, rgba(255, 255, 255, 0.6) 100%), url('gbrGEM.jpg');
            background-size: cover; background-position: center;
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%; max-width: 450px;
            background: rgba(237, 190, 190, 0.85); 
            padding: 25px 30px;
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        h1 { font-size: 28px; color: #5d4a8e; margin-bottom: 20px; text-transform: uppercase; }

        .tombol-grup { display: flex; flex-direction: column; gap: 8px; }

        .menu-btn {
            padding: 12px;
            background: rgba(255, 255, 255, 0.5);
            /* Border konsisten untuk semua tombol */
            border: 2px solid rgba(255, 255, 255, 0.6);
            color: #4a3a6a; font-size: 15px; font-weight: 600;
            border-radius: 15px; cursor: pointer; transition: 0.3s;
        }

        .menu-btn:hover {
            background: rgba(211, 84, 0, 0.8); color: white; border-color: transparent;
            transform: scale(1.02);
        }

        /* PERBAIKAN: Tombol Tanya AI sekarang sama desainnya, tanpa garis biru */
        .btn-ai { 
            background: rgba(255, 255, 255, 0.5); 
            border: 2px solid rgba(255, 255, 255, 0.6); 
            color: #4a3a6a; 
        }
        .btn-ai:hover { 
            background: rgba(211, 84, 0, 0.8); color: white; border-color: transparent; 
        }

        .btn-home { margin-top: 5px; background: rgba(255, 255, 255, 0.3); color: #5d4a8e; border: none; }
        .btn-home:hover { background: #5d4a8e; color: white; }
    </style>
</head>
<body>
    <audio id="suara-klik" src="klik.mp3"></audio>

    <div class="container animate__animated animate__zoomIn">
        <h1>MENU UTAMA</h1>
        <div class="tombol-grup">
            <button class="menu-btn" onclick="mainkanDanPindah('tujuan.html')">TUJUAN</button>
            <button class="menu-btn" onclick="mainkanDanPindah('materi.html')">MATERI</button>
            <button class="menu-btn" onclick="mainkanDanPindah('simulasi.html')">SIMULASI</button>
            <button class="menu-btn" onclick="mainkanDanPindah('evaluasi.html')">EVALUASI</button>
            <button class="menu-btn" onclick="mainkanDanPindah('referensi.html')">REFERENSI</button>
            <button class="menu-btn btn-ai" onclick="bukaEksternal('https://gemini.google.com')">TANYA AI</button>
            <button class="menu-btn" onclick="mainkanDanPindah('finish.html')">FINISH</button>
            <button class="menu-btn btn-home" onclick="mainkanDanPindah('index.html')">KEMBALI</button>
        </div>
    </div>

    <script>
        function mainkanDanPindah(url) {
            const audio = document.getElementById("suara-klik");
            audio.currentTime = 0;
            audio.play().catch(e => console.log("Audio diblokir:", e));
            setTimeout(function() { window.location.href = url; }, 300);
        }

        function bukaEksternal(url) {
            const audio = document.getElementById("suara-klik");
            audio.currentTime = 0;
            audio.play().catch(e => console.log("Audio diblokir:", e));
            setTimeout(function() { window.open(url, '_blank'); }, 300);
        }
    </script>
</body>
</html>
