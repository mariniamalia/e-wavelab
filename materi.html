<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>MATERI - E-WAVELAB</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        /* Memastikan Judul ke Tengah */
        h1 { text-align: center; width: 100%; color: #5d4a8e; }

        .materi-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .materi-card {
            background: rgba(255, 255, 255, 0.5); 
            padding: 10px;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .materi-card img {
            width: 100%;
            height: 90px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 5px;
        }

        .materi-card p {
            font-size: 11px;
            font-weight: 700;
            color: #5d4a8e;
            margin: 5px 0;
            text-transform: uppercase;
        }

        .materi-card:hover {
            transform: translateY(-5px) scale(1.05);
            background: rgba(211, 84, 0, 0.7);
            box-shadow: 0 10px 20px rgba(211, 84, 0, 0.3);
        }
        
        .materi-card:hover p { color: #ffffff; }

        @media (max-width: 768px) { .materi-grid { grid-template-columns: repeat(2, 1fr); } }
        
        /* Memastikan tombol kembali ke tengah */
        .btn-wrapper { text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <audio id="suara-klik" src="klik.mp3"></audio>

    <div class="container animate__animated animate__zoomIn">
        <h1>MATERI GELOMBANG ELEKTROMAGNETIK</h1>
        
        <div class="materi-grid">
            <div class="materi-card" onclick="bukaMateri('materi_detail.html?id=1')"><img src="assets/1-peta.PNG"><p>Peta Konsep</p></div>
            <div class="materi-card" onclick="bukaMateri('materi_detail.html?id=2')"><img src="assets/2-konsep.PNG"><p>Konsep Gelombang</p></div>
            <div class="materi-card" onclick="bukaMateri('materi_detail.html?id=3')"><img src="assets/3-spektrum.PNG"><p>Spektrum GEM</p></div>
            <div class="materi-card" onclick="bukaMateri('materi_detail.html?id=4')"><img src="assets/4-gamma.PNG"><p>Sinar Gamma</p></div>
            <div class="materi-card" onclick="bukaMateri('materi_detail.html?id=5')"><img src="assets/5-x.PNG"><p>Sinar-X</p></div>
            <div class="materi-card" onclick="bukaMateri('materi_detail.html?id=6')"><img src="assets/6-uv.PNG"><p>Sinar UV</p></div>
            <div class="materi-card" onclick="bukaMateri('materi_detail.html?id=7')"><img src="assets/7-tampak.PNG"><p>Cahaya Tampak</p></div>
            <div class="materi-card" onclick="bukaMateri('materi_detail.html?id=8')"><img src="assets/8-merah.PNG"><p>Inframerah</p></div>
            <div class="materi-card" onclick="bukaMateri('materi_detail.html?id=9')"><img src="assets/9-mikro.PNG"><p>Gelombang Mikro</p></div>
            <div class="materi-card" onclick="bukaMateri('materi_detail.html?id=10')"><img src="assets/10-radio.PNG"><p>Gelombang Radio</p></div>
        </div>

        <div class="btn-wrapper">
            <button class="btn btn-home" onclick="bukaMateri('menu.html')">KEMBALI KE MENU</button>
        </div>
    </div>

    <script>
        function bukaMateri(url) {
            const audio = document.getElementById("suara-klik");
            // Reset audio agar selalu bisa diklik cepat
            audio.currentTime = 0;
            audio.play().catch(e => console.log("Audio diblokir: ", e));
            
            setTimeout(() => {
                location.href = url;
            }, 300);
        }
    </script>
</body>
</html>
