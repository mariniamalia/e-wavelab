<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUJUAN PEMBELAJARAN - E-WAVELAB</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        * { font-family: 'Poppins', sans-serif !important; box-sizing: border-box; }

        body { 
            margin: 0; 
            background-image: linear-gradient(135deg, rgba(255, 255, 255, 0.6) 0%, rgba(255, 255, 255, 0.6) 100%), url('gbrGEM.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #4a3a6a;
        }

        .container {
            width: 90%;
            max-width: 650px;
            /* Warna container disesuaikan ke #edbebe */
            background: rgba(237, 190, 190, 0.85); 
            padding: 50px;
            border-radius: 40px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            color: #5d4a8e; 
            margin-bottom: 30px;
            text-transform: uppercase;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
        }

        .card {
            background: rgba(255, 255, 255, 0.4);
            padding: 30px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            margin-bottom: 30px;
        }

        .card p {
            font-size: 18px;
            line-height: 1.8;
            text-align: center;
            color: #4a3a6a;
            font-weight: 500;
            margin: 0;
        }

        button { 
            padding: 15px 40px; 
            font-size: 16px; 
            /* Warna tombol disesuaikan menjadi oranye-bata lembut */
            background: rgba(211, 84, 0, 0.8); 
            color: white; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: 600;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(211, 84, 0, 0.2);
        }
        
        button:hover { 
            background: rgba(211, 84, 0, 1); 
            transform: translateY(-3px); 
        }
    </style>
</head>
<body class="animate__animated animate__fadeIn">
    <audio id="suara-klik" src="klik.mp3"></audio>

    <div class="container">
        <h1>TUJUAN PEMBELAJARAN</h1>
        <div class="card">
            <p>
                Murid mampu menganalisis hubungan frekuensi, panjang gelombang, dan energi gelombang elektromagnetik serta menjelaskan penerapan gelombang elektromagnetik dalam kehidupan sehari-hari melalui pembelajaran interaktif berbasis Kecerdasan Artifisial.
            </p>
        </div>
        
        <div>
            <button onclick="mainkanDanPindah('menu.html')">KEMBALI KE MENU UTAMA</button>
        </div>
    </div>

    <script>
        function mainkanDanPindah(url) {
            var suara = document.getElementById("suara-klik");
            suara.play();
            document.querySelector('.container').classList.add('animate__fadeOut');
            setTimeout(function() {
                window.location.href = url;
            }, 600);
        }
    </script>
</body>
</html>
